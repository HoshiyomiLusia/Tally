services:
  app:
    build:
      context: .
      args:
        # 子路径部署: 在本机 .env 里设 VITE_BASE=/tally/ 之类 (带首尾斜杠); 默认 / 为根部署
        VITE_BASE: "${VITE_BASE:-/}"
    container_name: tally
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:8002"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/tally.db
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    volumes:
      - ./data:/data
