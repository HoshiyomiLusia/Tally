services:
  app:
    build: .
    container_name: tally
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8088}:8002"
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/tally.db
      SECRET_KEY: ${SECRET_KEY:-change-me}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    volumes:
      - ./data:/data
